<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Set new password</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>body{font-family:Arial,Helvetica,sans-serif;padding:16px} input{width:100%;padding:8px;margin-top:6px;border:1px solid #ddd;border-radius:4px} button{margin-top:12px;padding:10px;background:#007bff;color:#fff;border:none;border-radius:4px}</style>
</head>
<body>
    <h2>Set a new password</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.new_password1.label_tag }}
        {{ form.new_password1 }}
        {{ form.new_password2.label_tag }}
        {{ form.new_password2 }}
        <button type="submit">Change password</button>
    </form>
</body>
</html>
