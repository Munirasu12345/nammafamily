<!DOCTYPE html>
<html>
<head>
    <title>Admin - Forgot Password</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>body{font-family:Arial,Helvetica,sans-serif;padding:16px} form{max-width:420px;margin:0 auto;background:#fff;padding:16px;border-radius:6px;border:1px solid #eee} label{display:block;margin-top:8px} input{width:100%;padding:8px;margin-top:6px;border:1px solid #ddd;border-radius:4px} button{margin-top:12px;padding:10px;background:#007bff;color:#fff;border:none;border-radius:4px}</style>
</head>
<body>
    <h2>Admin - Forgot Password</h2>
    <p>Enter the admin username and a new password. You must provide the secret key configured in settings.ADMIN_PASSWORD_RESET_KEY.</p>
    <form method="post">
        {% csrf_token %}
        <label>Username<input name="username" required></label>
        <label>New password<input name="new_password" type="password" required></label>
        <label>Secret key<input name="secret" required></label>
        <button type="submit">Reset password</button>
    </form>
</body>
</html>
