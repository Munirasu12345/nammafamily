<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Password reset</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>body{font-family:Arial,Helvetica,sans-serif;padding:16px} form{max-width:480px;margin:0 auto} label{display:block;margin-top:8px} input{width:100%;padding:8px;margin-top:6px;border:1px solid #ddd;border-radius:4px} button{margin-top:12px;padding:10px;background:#007bff;color:#fff;border:none;border-radius:4px}</style>
</head>
<body>
    <h2>Password reset</h2>
    <p>Enter the email address associated with your admin account. You'll receive an email with a link to reset your password.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.email.label_tag }}
        {{ form.email }}
        <button type="submit">Send reset email</button>
    </form>
</body>
</html>
